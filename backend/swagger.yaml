openapi: 3.1.0
info:
  title: Netflix Clone API Project
  description: Netflix API Express JS MongoDB Databases
paths:
  /my-movies/{email}/{token}:
    get:
      summary: Get Favorite Movies User
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - in: path
          name: token
          required: true
          schema:
          type: string
      responses:
        200:
          description: "Success Getting Favorite Movies"
        401:
          description: "Failed to Get Favorite Movies, Unauthorized"
  /my-movies:
      post:
        summary: Saving User Favorite Movies to Database
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    example: testing@123.com
                  token:
                    type: string
                    example: xxx12332
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      title: 
                        type: string
                        example: Hello !
                      description:
                        type: string
                        example: description hello
        responses:
          201:
            description: Add Favorite Movie Success
          401:
            description: Failed Getting Favorite Movies, Unauthorized
